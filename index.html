<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-EARTH Survival Guide | K-IQ Test</title>
    <!-- 레트로 게임 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #FDF5E6;
            --main-brown: #8B4513;
            --point-red: #FF4500;
            --success-green: #4CAF50;
        }

        body {
            background-color: #1a110a;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: var(--main-brown);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; line-height: 1.5; }

        .game-frame {
            width: 100%;
            max-width: 450px;
            height: 95vh;
            max-height: 850px;
            background-color: var(--bg-color);
            border: 6px solid var(--main-brown);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
            position: relative;
            cursor: pointer;
        }

        .active-screen { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 배경 미디어 레이어 */
        .media-layer {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background: #2c1e14; overflow: hidden;
        }
        
        .media-layer video, .media-layer img { 
            width: 100%; height: 100%; object-fit: cover; z-index: 5; 
            position: absolute; top: 0; left: 0;
        }

        #start-screen .media-layer video { object-fit: fill; }
        
        .media-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #3d2b1f;
            color: #8b6d5c; text-align: center; padding: 20px;
            position: absolute; top: 0; left: 0;
        }

        /* 대화창 */
        .dialogue-container {
            position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
            width: 92%; background: white; border: 4px solid var(--main-brown);
            padding: 15px; z-index: 20; border-radius: 8px; box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        }

        /* 선택지 오버레이 */
        .choice-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 30; display: none;
            flex-direction: column; justify-content: flex-start; align-items: center;
            padding: 20px; overflow-y: auto;
            cursor: default;
        }

        .choice-btn {
            background: white; border: 3px solid var(--main-brown); width: 100%;
            margin-bottom: 12px; padding: 10px; display: flex; flex-direction: column;
            gap: 8px; transition: all 0.2s; text-align: left; border-radius: 12px;
            cursor: pointer;
        }

        .choice-btn:hover { background: var(--bg-color); transform: translateY(-2px); }

        .choice-img-container {
            width: 100%; aspect-ratio: 16 / 9; background: #eee;
            border: 2px solid var(--main-brown); border-radius: 6px; overflow: hidden;
            position: relative;
        }
        .choice-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .num-box {
            background: #333; color: white; padding: 4px 10px; font-size: 14px;
            font-family: 'Press Start 2P'; margin-right: 12px; border-radius: 4px;
        }

        .heart-bar {
            position: absolute; top: 20px; right: 20px; z-index: 40;
            display: flex; gap: 5px; background: rgba(0,0,0,0.5);
            padding: 8px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
        }

        .pixel-btn-simple {
            border: 3px solid var(--main-brown); background: white; padding: 12px;
            font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer;
            box-shadow: 4px 4px 0 var(--main-brown); width: 100%; transition: all 0.1s;
        }
        .pixel-btn-simple:active { box-shadow: 0 0 0 var(--main-brown); transform: translate(2px, 2px); }

        .portrait { width: 55px; height: 55px; border: 2px solid var(--main-brown); border-radius: 4px; object-fit: cover; background: #ddd; }

        .feedback-content {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 60px 20px;
        }
        
        .desc-box {
            background-color: rgba(255, 255, 255, 0.95); border: 4px solid var(--main-brown);
            padding: 20px; box-shadow: 8px 8px 0px rgba(0,0,0,0.2); width: 100%; max-width: 380px;
            border-radius: 8px;
        }

        .game-over-title {
            color: #FF0000; font-size: 3rem; text-shadow: 4px 4px 0px #000;
            text-align: center; margin-bottom: 20px; animation: pulse 1s infinite;
            line-height: 1;
        }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
            border-radius: 20px; z-index: 1000; display: none;
        }

        .tap-guide {
            color: white; font-size: 11px; opacity: 0.8;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            width: 100%;
        }

        #start-screen .tap-guide {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="toast">복사되었습니다!</div>

    <div class="game-frame">
        <!-- 1. 시작 화면 -->
        <section id="start-screen" class="screen active-screen" onclick="startGame()">
            <div class="media-layer">
                <!-- 오프닝 영상 깃허브 링크로 교체 가능 -->
                <video autoplay loop muted playsinline id="intro-video">
                    <source src="https://github.com/user-attachments/assets/053a0ff2-1790-4924-aefc-ccda777dd5b1" type="video/mp4">
                </video>
                <div class="media-placeholder pixel-font" id="intro-placeholder">
                    <div class="text-4xl mb-4">🇰🇷</div>
                    K-EARTH<br>SURVIVAL
                </div>
            </div>
            <div class="relative z-10 h-full flex flex-col justify-end p-10 bg-gradient-to-t from-black via-black/40 to-transparent text-center">
                <h1 class="pixel-font text-white text-lg mb-48 leading-relaxed tracking-tight">CAN YOU SURVIVE<br>IN KOREA?</h1>
                <div class="tap-guide blink">TAP ANYWHERE TO START</div>
            </div>
        </section>

        <!-- 2. 게임 플레이 화면 -->
        <section id="gameplay-screen" class="screen" onclick="handleGameplayTap()">
            <div class="heart-bar" id="lives-display"></div>
            
            <div class="media-layer">
                <!-- 퀴즈 영상이 로드되는 곳 -->
                <video id="quiz-video" muted playsinline style="display:none;"></video>
                <div id="quiz-placeholder" class="media-placeholder">
                    <div id="quiz-icon" class="text-6xl mb-4">📍</div>
                    <div class="pixel-font text-xs opacity-50">SCENE LOADING...</div>
                </div>
            </div>

            <div id="choice-area" class="choice-overlay" onclick="event.stopPropagation()">
                <div class="pixel-font text-white text-[10px] mb-6 tracking-widest text-center w-full">▼ SELECT YOUR ACTION</div>
                
                <!-- 선택지 A -->
                <button onclick="checkAnswer('A')" class="choice-btn">
                    <div class="choice-img-container">
                        <img id="img-a" src="" alt="Option A" onerror="this.parentElement.querySelector('.err-ui').style.display='flex'; this.style.display='none';">
                        <div class="err-ui absolute inset-0 flex items-center justify-center bg-gray-200 text-gray-400 font-bold" style="display:none;">IMAGE</div>
                    </div>
                    <div class="flex items-center px-2 py-1"><span class="num-box">1</span><span id="text-a" class="font-bold text-[15px] text-slate-800 leading-tight"></span></div>
                </button>

                <!-- 선택지 B -->
                <button onclick="checkAnswer('B')" class="choice-btn">
                    <div class="choice-img-container">
                        <img id="img-b" src="" alt="Option B" onerror="this.parentElement.querySelector('.err-ui').style.display='flex'; this.style.display='none';">
                        <div class="err-ui absolute inset-0 flex items-center justify-center bg-gray-200 text-gray-400 font-bold" style="display:none;">IMAGE</div>
                    </div>
                    <div class="flex items-center px-2 py-1"><span class="num-box">2</span><span id="text-b" class="font-bold text-[15px] text-slate-800 leading-tight"></span></div>
                </button>
            </div>

            <div class="dialogue-container">
                <div class="flex gap-4 items-center">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=K-Guide" class="portrait" alt="Guide">
                    <div class="flex-1"><p id="dialogue-text" class="text-[13px] font-bold leading-snug text-slate-700"></p></div>
                </div>
                <div class="absolute bottom-2 right-4 text-[#8B4513] text-[10px] blink">▼</div>
            </div>
            
            <div class="absolute bottom-[105px] left-0 w-full text-center z-10">
                <div id="quiz-tap-guide" class="tap-guide blink text-[9px] opacity-60">TAP TO SEE CHOICES</div>
            </div>
        </section>

        <!-- 3. 피드백 화면 -->
        <section id="feedback-screen" class="screen bg-black" onclick="toNext()">
            <div class="media-layer">
                <img id="feedback-bg-img" src="" alt="Feedback BG" style="display:none;">
                <div id="feedback-placeholder" class="media-placeholder" style="background: #1a1a1a;"></div>
            </div>
            <div class="feedback-content">
                <div class="flex flex-col items-center">
                    <h2 id="feedback-title" class="pixel-font drop-shadow-[0_4px_4px_rgba(0,0,0,1)] text-center mb-2" style="font-size: 2.5rem;"></h2>
                    <div class="tap-guide blink">TAP TO CONTINUE</div>
                </div>
                <div class="desc-box">
                    <p id="feedback-desc" class="text-[15px] text-slate-800 leading-relaxed font-bold text-center"></p>
                </div>
            </div>
        </section>

        <!-- 4. 게임 오버 / 결과 화면 (생략 가능하나 구조 유지를 위해 유지) -->
        <section id="game-over-screen" class="screen bg-[#1a110a]" onclick="location.reload()">
            <div class="feedback-content justify-center px-6">
                <h2 class="pixel-font game-over-title">GAME OVER</h2>
                <div class="grid gap-3 w-full max-w-xs z-20" onclick="event.stopPropagation()">
                    <button onclick="location.reload()" class="pixel-btn-simple !bg-[#FF0000] !text-white">RETRY MISSION</button>
                    <button onclick="copyGameLink(this)" class="pixel-btn-simple">COPY SCORE 🔗</button>
                </div>
                <div class="tap-guide blink mt-10">TAP ANYWHERE TO RETRY</div>
            </div>
        </section>

        <section id="result-screen" class="screen p-6 justify-center items-center bg-[#FDF5E6]">
            <div class="text-center w-full flex flex-col h-full justify-center items-center px-4 overflow-y-auto">
                <h2 class="text-xl font-black text-slate-800 mb-2">Your Final K-Grade</h2>
                <div id="rank-display" class="text-4xl font-black my-8 text-[#8B4513]"></div>
                <div class="bg-white border-4 border-[#8B4513] p-5 mb-8 rounded-lg shadow-inner w-full">
                    <p id="result-desc" class="text-[14px] font-bold text-center"></p>
                </div>
                <div class="grid gap-4 w-full max-w-xs">
                    <button onclick="location.reload()" class="pixel-btn-simple">Retry Mission</button>
                    <button onclick="copyGameLink(this)" class="pixel-btn-simple !bg-white !text-blue-600">Copy Result Link 🔗</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        /**
         * 💡 깃허브 관리 팁:
         * 1. 깃허브 이슈/토론에 영상이나 이미지를 업로드합니다.
         * 2. 생성된 주소를 아래 URL 항목에 붙여넣으세요.
         */
        const quizData = [
            { 
                icon: "🍲", 
                videoUrl: "https://github.com/user-attachments/assets/8df8b6df-b065-43b4-b2e2-a5827f929dd1", // 예시: 깃허브 영상 주소
                introText: "I'm here to eat 'Pork Back-bone Stew'! How do I order?", 
                a: "Press the bell on the table", 
                imgA: "https://github.com/user-attachments/assets/043d0539-fb9e-4aec-b9d0-0d7c3c38ab96", // 예시: 깃허브 이미지 주소
                b: "Look at the staff", 
                imgB: "https://github.com/user-attachments/assets/c42ca265-ce3e-43f9-a054-e50c5b04e175",
                answer: "A", 
                feedback: "Most restaurants have a call bell on the table. Press it to get quick attention from the staff!" 
            },
            // 추가 문제들을 같은 형식으로 작성하세요.
            { 
                icon: "🙇", 
                videoUrl: "https://github.com/user-attachments/assets/영상_주소",
                introText: "The owner welcomes me warmly. How should I greet them?", 
                a: "Wave my hand", 
                imgA: "https://github.com/user-attachments/assets/이미지_주소",
                b: "Give a slight bow", 
                imgB: "https://github.com/user-attachments/assets/이미지_주소",
                answer: "B", 
                feedback: "Giving a 'slight bow' is the most natural way to greet elders in Korea." 
            }
        ];

        let currentIdx = 0, lives = 3, score = 0, isIntroState = false;
        const SHARE_URL = "https://sunny-cat-7f7440.netlify.app/";

        const qVideo = document.getElementById('quiz-video');
        const qPlaceholder = document.getElementById('quiz-placeholder');
        const qIcon = document.getElementById('quiz-icon');
        const dialogue = document.getElementById('dialogue-text');
        const choiceArea = document.getElementById('choice-area');
        const feedbackBg = document.getElementById('feedback-bg-img');
        const feedbackPlaceholder = document.getElementById('feedback-placeholder');
        const feedbackTitle = document.getElementById('feedback-title');
        const quizTapGuide = document.getElementById('quiz-tap-guide');

        function startGame() {
            currentIdx = 0; lives = 3; score = 0;
            showScreen('gameplay-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const data = quizData[currentIdx];
            updateLives();
            isIntroState = true;
            
            choiceArea.style.display = 'none';
            feedbackBg.style.display = 'none';
            feedbackPlaceholder.style.display = 'none';
            quizTapGuide.style.display = 'block';
            
            // 영상 처리
            if (data.videoUrl) {
                qVideo.src = data.videoUrl;
                qVideo.style.display = 'block';
                qVideo.load();
                qVideo.play().catch(() => {
                    qVideo.style.display = 'none';
                    qPlaceholder.style.display = 'flex';
                    qIcon.innerText = data.icon;
                });
            } else {
                qVideo.style.display = 'none';
                qPlaceholder.style.display = 'flex';
                qIcon.innerText = data.icon;
            }

            dialogue.innerText = data.introText;
        }

        function handleGameplayTap() {
            if (isIntroState) showChoices();
        }

        function showChoices() {
            isIntroState = false;
            const data = quizData[currentIdx];
            
            document.getElementById('text-a').innerText = data.a;
            document.getElementById('text-b').innerText = data.b;

            const updateImg = (elId, src) => {
                const img = document.getElementById(elId);
                const err = img.parentElement.querySelector('.err-ui');
                err.style.display = 'none';
                img.style.display = 'block';
                if (src) img.src = src;
                else { img.style.display = 'none'; err.style.display = 'flex'; }
            };

            updateImg('img-a', data.imgA);
            updateImg('img-b', data.imgB);

            choiceArea.style.display = 'flex';
            quizTapGuide.style.display = 'none';
            dialogue.innerText = "Select your action:";
        }

        function checkAnswer(choice) {
            const data = quizData[currentIdx];
            const isCorrect = choice === data.answer;
            showScreen('feedback-screen');
            
            if (isCorrect) {
                score++;
                feedbackTitle.innerText = "SUCCESS";
                feedbackTitle.style.color = "var(--success-green)";
                feedbackPlaceholder.innerHTML = `<div class="text-9xl">✅</div>`;
                feedbackPlaceholder.style.display = 'flex';
            } else {
                lives--;
                feedbackTitle.innerText = "FAILED";
                feedbackTitle.style.color = "var(--point-red)";
                feedbackPlaceholder.innerHTML = `<div class="text-9xl">❌</div>`;
                feedbackPlaceholder.style.display = 'flex';
            }
            
            document.getElementById('feedback-desc').innerText = data.feedback;
            updateLives();
        }

        function toNext() {
            if (lives <= 0) return showScreen('game-over-screen');
            currentIdx++;
            if (currentIdx < quizData.length) {
                showScreen('gameplay-screen');
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            showScreen('result-screen');
            const rank = score === quizData.length ? "Honorary Korean" : (score >= 6 ? "K-Explorer" : "K-Newbie");
            document.getElementById('rank-display').innerText = rank;
            document.getElementById('result-desc').innerText = `You scored ${score}/${quizData.length}!`;
        }

        function updateLives() {
            const bar = document.getElementById('lives-display');
            bar.innerHTML = lives > 0 ? '❤️'.repeat(lives) : '🖤'.repeat(3);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function copyGameLink(btn) {
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = `I scored ${score}/${quizData.length} on K-EARTH Survival Guide! 🇰🇷\n${SHARE_URL}`;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
            btn.innerText = "Copied! ✅";
        }

        window.onload = () => updateLives();
    </script>
</body>
</html>
