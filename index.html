<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-EARTH Survival Guide | K-IQ Test</title>
    <!-- 픽셀 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #FDF5E6;
            --main-brown: #8B4513;
            --point-orange: #FF4500;
            --border-width: 4px;
        }

        body {
            background-color: #1a110a;
            font-family: 'Arial', sans-serif;
            color: var(--main-brown);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; line-height: 1.5; }

        /* JRPG 게임기 프레임 */
        .game-frame {
            width: 100%;
            max-width: 450px;
            height: 95vh;
            max-height: 850px;
            background-color: var(--bg-color);
            border: 6px solid var(--main-brown);
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        .active-screen { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 비디오 배경 레이어 */
        .video-layer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .video-layer video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 5;
        }

        .video-placeholder {
            position: absolute;
            z-index: 1;
            text-align: center;
            color: rgba(255,255,255,0.4);
            background: linear-gradient(45deg, #2c1e14, #000);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 대화창 UI */
        .dialogue-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            background: white;
            border: 4px solid var(--main-brown);
            padding: 15px;
            z-index: 20;
            border-radius: 4px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        }

        /* 선택지 오버레이 */
        .choice-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 30;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            display: none;
        }

        .choice-btn {
            background: white;
            border: 3px solid var(--main-brown);
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
            text-align: left;
            border-radius: 8px;
        }

        .choice-btn:hover {
            background: var(--bg-color);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .choice-img-container {
            width: 100%;
            height: 100px;
            background: #333;
            border: 2px solid var(--main-brown);
            border-radius: 4px;
            overflow: hidden;
        }

        .choice-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .num-box {
            background: #333;
            color: white;
            border: 1px solid var(--main-brown);
            padding: 2px 6px;
            font-size: 8px;
            font-family: 'Press Start 2P';
            display: inline-block;
            margin-right: 8px;
        }

        /* 체력(목숨) 바 */
        .heart-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 40;
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .pixel-btn-simple {
            border: 3px solid var(--main-brown);
            background: white;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--main-brown);
            width: 100%;
        }
        .pixel-btn-simple:active {
            box-shadow: 0 0 0 var(--main-brown);
            transform: translate(2px, 2px);
        }

        .portrait {
            width: 60px;
            height: 60px;
            border: 2px solid var(--main-brown);
            object-fit: cover;
            background: #eee;
        }

        /* 프로그레스 바 */
        .timer-bar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            z-index: 50;
        }
        .timer-bar {
            height: 100%;
            width: 100%;
            background: var(--point-orange);
            transition: width linear;
        }
    </style>
</head>
<body>

    <div class="game-frame" id="game-frame">
        
        <!-- 1. 시작 화면 -->
        <section id="start-screen" class="screen active-screen">
            <div class="video-layer">
                <div class="video-placeholder flex flex-col items-center">
                    <div class="pixel-font text-[10px] mb-4 text-white">MISSION: K-EARTH</div>
                    <div class="w-12 h-12 border-4 border-dashed border-white/20 rounded-full animate-spin"></div>
                </div>
                <video id="opening-video" autoplay loop muted playsinline onerror="this.style.display='none'">
                    <source src="https://github.com/user-attachments/assets/053a0ff2-1790-4924-aefc-ccda777dd5b1" type="video/mp4">
                </video>
            </div>
            <div class="relative z-10 h-full flex flex-col justify-end p-8 bg-gradient-to-t from-black via-black/40 to-transparent">
                <div class="pixel-font text-[9px] text-yellow-400 mb-2 tracking-widest uppercase">
                    <span class="blink">●</span> Link Established
                </div>
                <h1 class="text-3xl font-black text-white leading-tight mb-6 drop-shadow-lg">Unlock the <br>Secret Codes</h1>
                <button onclick="startGame()" class="pixel-font text-sm bg-[#FF4500] text-white p-5 border-2 border-black shadow-[4px_4px_0_#000] active:translate-y-1 active:shadow-none transition-all">
                    START TEST 🧠
                </button>
            </div>
        </section>

        <!-- 2. 게임 플레이 화면 -->
        <section id="gameplay-screen" class="screen">
            <div class="timer-bar-container"><div id="timer-bar" class="timer-bar"></div></div>
            <div class="heart-bar" id="lives-display"></div>
            
            <div class="video-layer">
                <div id="quiz-video-fallback" class="video-placeholder flex flex-col items-center text-white/50">
                    <div id="fallback-icon" class="text-7xl mb-4 opacity-40 animate-pulse">🛸</div>
                    <div class="pixel-font text-[8px]">SIMULATING SITUATION...</div>
                </div>
                <video id="quiz-video" muted playsinline onplay="document.getElementById('quiz-video-fallback').style.display='none'">
                    <source src="https://github.com/user-attachments/assets/8df8b6df-b065-43b4-b2e2-a5827f929dd1" type="video/mp4">
                </video>
            </div>

            <!-- 퀴즈 선택지 오버레이 -->
            <div id="choice-area" class="choice-overlay">
                <div class="pixel-font text-white text-[10px] mb-6 tracking-tighter">▼ ACTION REQUIRED</div>
                
                <button onclick="checkAnswer('A')" class="choice-btn">
                    <div class="choice-img-container">
                        <img id="img-a" src="" alt="Choice A" onerror="this.src='https://via.placeholder.com/400x200/333/fff?text=OPTION+A'">
                    </div>
                    <div class="flex items-start p-1">
                        <span class="num-box">A</span>
                        <span id="text-a" class="font-bold text-[11px] text-slate-800 leading-tight"></span>
                    </div>
                </button>

                <button onclick="checkAnswer('B')" class="choice-btn">
                    <div class="choice-img-container">
                        <img id="img-b" src="https://github.com/user-attachments/assets/98788de7-6c0d-4529-8ed3-372a5fbb0765" alt="Choice B" onerror="this.src='https://via.placeholder.com/400x200/333/fff?text=OPTION+B'">
                    </div>
                    <div class="flex items-start p-1">
                        <span class="num-box">B</span>
                        <span id="text-b" class="font-bold text-[11px] text-slate-800 leading-tight"></span>
                    </div>
                </button>
            </div>

            <!-- 대화창 -->
            <div class="dialogue-container">
                <div class="flex gap-4 items-center">
                    <img id="char-portrait" src="image (3).jpg" class="portrait" alt="Guide" onerror="this.src='https://via.placeholder.com/60/8B4513/fff?text=K'">
                    <div class="flex-1">
                        <p id="dialogue-text" class="text-[12px] font-bold leading-snug text-slate-700"></p>
                    </div>
                </div>
                <div class="absolute bottom-2 right-4 text-[#8B4513] text-[10px] blink">▼</div>
            </div>
        </section>

        <!-- 3. 피드백 화면 (정답/오답) -->
        <section id="feedback-screen" class="screen justify-center items-center p-8 bg-black/95">
            <div class="bg-white border-4 border-[#8B4513] p-8 text-center w-full shadow-2xl">
                <div id="feedback-icon-display" class="text-7xl mb-6"></div>
                <h2 id="feedback-title" class="pixel-font text-lg mb-4"></h2>
                <p id="feedback-desc" class="text-[13px] text-slate-600 mb-8 leading-relaxed font-medium"></p>
                <button onclick="toNext()" class="pixel-font text-[10px] bg-black text-white p-5 w-full active:translate-y-1">
                    CONTINUE ▶
                </button>
            </div>
        </section>

        <!-- 4. 최종 결과 화면 -->
        <section id="result-screen" class="screen p-8 justify-center items-center bg-[#FDF5E6]">
            <div class="text-center w-full">
                <div class="pixel-font text-[10px] text-[#FF4500] mb-2 tracking-widest uppercase">Mission Terminated</div>
                <h2 class="text-2xl font-black mb-1 text-slate-800">Final K-Grade</h2>
                <div id="rank-display" class="text-7xl font-black my-8 text-[#8B4513]"></div>
                
                <div class="bg-white border-4 border-[#8B4513] p-6 mb-8 text-left">
                    <p id="result-desc" class="text-[13px] leading-relaxed text-slate-700 font-bold"></p>
                </div>

                <div class="grid gap-3">
                    <button onclick="location.reload()" class="pixel-btn-simple">Retry Mission</button>
                    <button class="pixel-btn-simple !bg-[#FF4500] !text-white !border-black">Get Guidebook</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        const quizData = [
            {
                video: "최종 질문.mp4",
                icon: "☕",
                introText: "I just got to the cafe, but it’s almost full and I have so much luggage. How should I grab a seat?",
                question: "Choose your action to save a seat:",
                a: "Carry all bags to the counter and order first",
                aImg: "3a4033a4-e94d-4b7d-a03a-8218d49f2e95.jpg",
                b: "Leave my phone on an empty table to save a seat",
                bImg: "최종 정답.jpg",
                answer: "B",
                feedback: "Correct! In Korea, leaving a phone or laptop on a table is a common way to reserve a seat. It's surprisingly safe!",
                timeToChoice: 4000
            },
            {
                video: "ail.mp4", 
                icon: "🚇",
                introText: "The subway is packed! I see some different colored seats at the ends of the train. Where should I sit?",
                question: "Which color seat is appropriate for you?",
                a: "The Pink seats at the end",
                aImg: "pink_seat.jpg", 
                b: "The regular Blue seats",
                bImg: "blue_seat.jpg",
                answer: "B",
                feedback: "Correct! Pink seats are strictly for pregnant women. Even if they are empty, locals leave them for those in need.",
                timeToChoice: 4000
            },
            {
                video: "sign.mp4", 
                icon: "🏨",
                introText: "Checking into my hotel! They gave me a multi-color pen. Which color should I use to sign my name?",
                question: "Which ink color is the safest to use?",
                a: "Use the Red ink",
                aImg: "red_pen.jpg",
                b: "Use the Black ink",
                bImg: "black_pen.jpg",
                answer: "B",
                feedback: "Correct! Writing a name in red ink is traditionally associated with death in Korea. Always stick to black or blue!",
                timeToChoice: 4000
            }
        ];

        let currentIdx = 0;
        let lives = 3;
        let score = 0;
        let choiceTimer;

        const qVideo = document.getElementById('quiz-video');
        const dialogue = document.getElementById('dialogue-text');
        const choiceArea = document.getElementById('choice-area');
        const fallback = document.getElementById('quiz-video-fallback');
        const timerBar = document.getElementById('timer-bar');

        function startGame() {
            currentIdx = 0;
            lives = 3;
            score = 0;
            showScreen('gameplay-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const data = quizData[currentIdx];
            updateLives();
            
            // 초기화
            clearTimeout(choiceTimer);
            choiceArea.style.display = 'none';
            qVideo.style.display = 'block';
            fallback.style.display = 'flex';
            document.getElementById('fallback-icon').innerText = data.icon;
            
            // 비디오 로드 시도
            if (data.video) {
                qVideo.src = data.video;
                qVideo.load();
                qVideo.play().catch(e => {
                    console.log("Video play failed, using fallback");
                    qVideo.style.display = 'none';
                    fallback.style.display = 'flex';
                });
            } else {
                qVideo.style.display = 'none';
                fallback.style.display = 'flex';
            }
            
            // 텍스트 출력 (타이핑 효과 생략, 즉시 출력)
            dialogue.innerText = data.introText;

            // 타이머 바 애니메이션
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            setTimeout(() => {
                timerBar.style.transition = `width ${data.timeToChoice}ms linear`;
                timerBar.style.width = '0%';
            }, 50);
            
            // 일정 시간 후 선택지 등장
            choiceTimer = setTimeout(() => {
                document.getElementById('img-a').src = data.aImg;
                document.getElementById('img-b').src = data.bImg;
                document.getElementById('text-a').innerText = data.a;
                document.getElementById('text-b').innerText = data.b;
                
                choiceArea.style.display = 'flex';
                dialogue.innerText = data.question;
            }, data.timeToChoice);
        }

        function checkAnswer(choice) {
            const data = quizData[currentIdx];
            const isCorrect = (choice === data.answer);
            
            showScreen('feedback-screen');
            const iconEl = document.getElementById('feedback-icon-display');
            const titleEl = document.getElementById('feedback-title');
            
            if (isCorrect) {
                score++;
                iconEl.innerText = "⭐";
                titleEl.innerText = "SUCCESS";
                titleEl.style.color = "#4CAF50";
            } else {
                lives--;
                iconEl.innerText = "💔";
                titleEl.innerText = "FAILED";
                titleEl.style.color = "#FF4500";
            }
            document.getElementById('feedback-desc').innerText = data.feedback;
        }

        function toNext() {
            if (lives <= 0) {
                showFinalResult();
                return;
            }
            
            currentIdx++;
            if (currentIdx < quizData.length) {
                showScreen('gameplay-screen');
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            showScreen('result-screen');
            const rankDisplay = document.getElementById('rank-display');
            const resultDesc = document.getElementById('result-desc');
            
            let rank = "C";
            let msg = "K-Newbie! You should study the guide before visiting Korea.";
            
            if (score === 3) { 
                rank = "SSS"; 
                msg = "Perfect! You are basically a Korean local. Welcome to the peninsula!"; 
            }
            else if (score === 2) { 
                rank = "A"; 
                msg = "Great job! You know the most critical survival tips."; 
            }
            else if (score === 1) { 
                rank = "B"; 
                msg = "You might get into some awkward situations. Study more!"; 
            }
            
            if (lives <= 0) {
                rank = "F";
                msg = "MISSION FAILED! You ran out of lives. The K-Earth is tougher than it looks!";
            }

            rankDisplay.innerText = rank;
            resultDesc.innerText = msg;
        }

        function updateLives() {
            const bar = document.getElementById('lives-display');
            bar.innerHTML = '';
            for(let i=0; i<3; i++) {
                const s = document.createElement('span');
                s.innerText = i < lives ? '❤️' : '🖤';
                s.className = 'text-lg';
                bar.appendChild(s);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        // 초기 생명 표시
        window.onload = () => updateLives();
    </script>
</body>
</html>
